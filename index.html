<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME Attendance Cloud - 2nd Year</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="top-nav">
        <h2>ME Attendance Cloud</h2>
        <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()">Dark Mode</button>
    </div>

    <div id="adminPanel">
        <div class="status-bar">
            <span class="status-active">● Editor Mode Active</span>
            <button onclick="logout()" class="btn-logout">Logout</button>
        </div>

        <div class="controls">
            <div class="input-group">
                <label>Class Date</label>
                <input type="date" id="classDate">
            </div>
            <div class="input-group">
                <label>Subject</label>
                <input type="text" id="subject" list="subjectList" placeholder="Subject...">
                <datalist id="subjectList">
                    <option value="UHV (Universal Human Values)"></option>
                    <option value="Basic Electronics Engineering"></option>
                    <option value="Mechanics of Deformable Solids"></option>
                    <option value="Engineering Mechanics"></option>
                    <option value="Mathematics-3"></option>
                    <option value="Applied Thermodynamics"></option>
                    <option value="Environmental Science"></option>
                    <option value="Mechanics of Deformable Solids Lab"></option>
                    <option value="Engineering Mechanics Lab"></option>
                    <option value="Applied Thermodynamics Lab"></option>
                    <option value="Basic Electronics Engineering Lab"></option>
                    <option value="Seminar / Presentation"></option>
                    <option value="Mentor / Mentee"></option>
                    <option value="Others"></option>
                </datalist>
            </div>
            <div class="input-group full-width">
                <label class="checkbox-container">
                    <input type="checkbox" id="isExtraLecture">
                    <span>Mark as Extra Lecture</span>
                </label>
            </div>
        </div>

        <div class="sort-bar">
            <button id="sortName" class="btn-sort active" onclick="updateView('name')">Highlight Name</button>
            <button id="sortCode" class="btn-sort" onclick="updateView('id')">Highlight Code</button>
        </div>

        <div class="list-header">
            <div class="col-sn">SN</div>
            <div class="col-info">Student Details</div>
            <div class="col-status">Status</div>
        </div>
        
        <div class="list-body-container">
            <div id="listBody"></div>
        </div>

        <button type="button" class="btn-submit" id="mainSaveBtn" onclick="pushToCloud()">Finalize & Save</button>
    </div>

    <div class="history-section">
        <div class="history-header-bar">
            <h3>History Search</h3>
            <input type="date" id="filterDate" onchange="fetchHistory(true)">
        </div>
        <div id="logsView" class="logs-loading">Loading logs...</div>
    </div>

    <div class="login-footer" id="loginBox">
        <p>Login to add or edit attendance</p>
        <input type="password" id="adminPass" placeholder="••••••••"><br>
        <button onclick="login()" class="btn-login">Admin Login</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
