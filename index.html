<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- jsPDF and AutoTable Libraries -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { 
            --present: #2ecc71; 
            --absent: #e74c3c; 
            --primary: #111111; 
            --accent: #333333;
            --bg: #1a1a1a; 
            --card-bg: #222222;
            --text: #e0e0e0;
            --text-muted: #888888;
            --border: #333333;
            --input-bg: #2a2a2a;
            --title-color: #ffffff;
            --panel-bg: #181818;
            --card-hdr-bg: #1f1f1f;
            --card-body-bg: #141414;
        }

        [data-theme="light"] {
            --primary: #ffffff; 
            --accent: #dddddd;
            --bg: #f4f6f9; 
            --card-bg: #ffffff;
            --text: #222222;
            --text-muted: #666666;
            --border: #cccccc;
            --input-bg: #ffffff;
            --title-color: #111111;
            --panel-bg: #eaeaea;
            --card-hdr-bg: #f0f0f0;
            --card-body-bg: #fafafa;
        }
        
        * {
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body { 
            background: var(--bg); 
            color: var(--text);
            padding: 20px 15px; 
            font-size: 13px; 
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        .container { 
            max-width: 650px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border: 1px solid var(--border);
            border-radius: 0px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            position: relative;
            transition: background 0.3s, border 0.3s;
        }
        
        .header-area {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--title-color);
        }

        .theme-toggle-btn {
            position: absolute;
            right: 0;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--title-color);
            padding: 5px;
            line-height: 1;
            transition: transform 0.2s;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }

        #adminPanel { 
            display: none; 
            border-bottom: 1px dashed var(--border); 
            padding-bottom: 25px; 
            margin-bottom: 25px; 
        }

        .status-bar {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            background: var(--panel-bg);
            padding: 10px 15px;
            border: 1px solid var(--border);
        }

        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            background: var(--panel-bg); 
            padding: 15px; 
            border: 1px solid var(--border);
            margin-bottom: 20px; 
        }

        @media (max-width: 480px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
            .filter-row {
                flex-direction: column;
                align-items: stretch !important;
            }
        }

        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            min-width: 0;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        label { 
            font-weight: 600; 
            font-size: 11px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted); 
        }

        input, select { 
            background: var(--input-bg);
            color: var(--text);
            padding: 10px; 
            border: 1px solid var(--border); 
            border-radius: 0px; 
            font-size: 13px; 
            outline: none;
            width: 100%; 
            max-width: 100%;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        
        input:focus, select:focus {
            border-color: #555555;
        }
        
        .checkbox-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            color: var(--text); 
            font-size: 12px;
            margin-top: 5px;
        }

        .checkbox-container input {
            width: 16px;
            height: 16px;
            accent-color: var(--text);
            cursor: pointer;
        }
        
        .sort-bar { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .btn-sort { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid var(--border); 
            background: var(--panel-bg); 
            color: var(--text-muted);
            border-radius: 0px; 
            cursor: pointer; 
            font-size: 11px; 
            text-transform: uppercase;
            font-weight: 600; 
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-sort.active { 
            background: var(--title-color); 
            color: var(--card-bg); 
            border-color: var(--title-color);
        }
        
        .list-header { 
            display: flex; 
            background: var(--panel-bg); 
            padding: 12px 10px; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-bottom: 10px; 
        }

        .list-body-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            background: var(--panel-bg);
        }

        .list-row { 
            display: flex; 
            align-items: center; 
            padding: 12px 10px; 
            border-bottom: 1px solid var(--border); 
        }
        
        .list-row:last-child {
            border-bottom: none;
        }

        .col-sn { width: 10%; color: var(--text-muted); font-weight: 600; }
        .col-info { width: 68%; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
        .col-status { width: 22%; display: flex; justify-content: flex-end; gap: 12px; }

        .focus-main { font-size: 13px; font-weight: 600; color: var(--title-color); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .focus-sub { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .radio-btn { 
            cursor: pointer; 
            font-weight: 700; 
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 2px 0;
            user-select: none;
        }

        .radio-btn input {
            accent-color: var(--title-color);
            cursor: pointer;
        }

        .radio-btn-p { color: var(--present); }
        .radio-btn-a { color: var(--absent); }

        .btn-submit { 
            background: var(--title-color); 
            color: var(--card-bg); 
            border: none; 
            padding: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%; 
            margin-top: 20px; 
            font-size: 13px; 
            transition: opacity 0.2s;
        }
        .btn-submit:hover {
            opacity: 0.9;
        }

        .section-box {
            margin-top: 25px;
            border-top: 2px solid var(--border);
            padding-top: 20px;
        }

        .section-title {
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            color: var(--title-color);
        }

        .filter-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn-excel {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        
        .btn-pdf {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .history-card { 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            margin-bottom: 10px; 
        }

        .card-header { 
            padding: 12px 15px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card-hdr-bg);
        }

        .card-body { 
            padding: 15px; 
            display: none; 
            background: var(--card-body-bg); 
            border-top: 1px solid var(--border); 
        }
        
        .btn-edit { 
            background: var(--input-bg); 
            color: var(--text); 
            border: 1px solid var(--border); 
            padding: 5px 10px; 
            font-size: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            text-transform: uppercase;
        }

        .btn-delete { 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 14px; 
            color: var(--text-muted); 
            padding: 0 5px;
        }
        .btn-delete:hover { color: var(--absent); }

        .view-toggle { 
            background: var(--input-bg); 
            color: var(--text);
            border: 1px solid var(--border); 
            padding: 4px 8px; 
            font-size: 10px; 
            cursor: pointer; 
            float: right; 
            text-transform: uppercase;
        }
        
        .login-footer { 
            margin-top: 30px; 
            padding: 20px; 
            background: var(--panel-bg); 
            border: 1px solid var(--border); 
            text-align: center; 
        }

        .login-footer p {
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .login-footer button {
            background: var(--title-color);
            color: var(--card-bg);
        }

        .tag { 
            display: inline-block; 
            padding: 4px 8px; 
            margin: 3px; 
            font-size: 11px; 
            font-weight: 500; 
        }
        .p-tag { background: rgba(46, 125, 50, 0.15); color: #2e7d32; border: 1px solid rgba(76, 175, 80, 0.3); }
        .a-tag { background: rgba(198, 40, 40, 0.15); color: #c62828; border: 1px solid rgba(244, 67, 54, 0.3); }
        
        [data-theme="dark"] .p-tag { color: #81c784; }
        [data-theme="dark"] .a-tag { color: #e57373; }

        .type-badge { 
            color: var(--card-bg); 
            background: var(--title-color);
            padding: 2px 6px; 
            font-size: 9px; 
            font-weight: 700; 
            text-transform: uppercase;
            display: inline-block; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>

        document.body.setAttribute('data-theme', savedTheme);
    };

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    function login() {
        if(document.getElementById('adminPass').value === "aks123") {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('loginBox').style.display = "none";
            renderHistoryLogs(); 
            alert("Login Successful");
        } else alert("Invalid Password");
    }

    function logout() {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('loginBox').style.display = "block";
        renderHistoryLogs();
    }

    function updateView(mode) {
        highlightMode = mode;
        document.getElementById('sortName').className = (mode === 'name') ? 'btn-sort active' : 'btn-sort';
        document.getElementById('sortCode').className = (mode === 'id') ? 'btn-sort active' : 'btn-sort';
        renderList();
    }

    function renderList() {
        const includeEE = document.getElementById('includeEE').checked;
        students = includeEE ? [...meStudents, ...eeStudents] : [...meStudents];

        if(highlightMode === 'name') students.sort((a,b) => a.name.localeCompare(b.name));
        else students.sort((a,b) => a.id.localeCompare(b.id));

        const listBody = document.getElementById('listBody');
        listBody.innerHTML = students.map((s, index) => {
            const isP = loadedPres.includes(s.id) || loadedPres.includes(s.name);
            return `<div class="list-row">
                <div class="col-sn">${index + 1}</div>
                <div class="col-info">
                    <span class="${highlightMode==='name'?'focus-main':'focus-sub'}">${s.name}</span>
                    <span class="${highlightMode==='id'?'focus-main':'focus-sub'}">${s.id}</span>
                </div>
                <div class="col-status">
                    <label class="radio-btn radio-btn-p"><input type="radio" name="st_${s.id}" value="P" ${isP?'checked':''}> P</label>
                    <label class="radio-btn radio-btn-a"><input type="radio" name="st_${s.id}" value="A" ${!isP?'checked':''}> A</label>
                </div>
            </div>`;
        }).join('');
    }

    function pushToCloud() {
        const date = document.getElementById('classDate').value;
        const sub = document.getElementById('subject').value || "Blank Subject Name";
        const isExtra = document.getElementById('isExtraLecture').checked;
        
        let pL = [], aL = [];
        let sortedToSave = [...students].sort((a,b) => a.id.localeCompare(b.id));

        sortedToSave.forEach(s => {
            const isP = document.querySelector(`input[name="st_${s.id}"]:checked`).value === 'P';
            let entry = { n: s.name, id: s.id, c: s.id.slice(-4) };
            isP ? pL.push(entry) : aL.push(entry);
        });

        const data = { date, sub, isExtra, pL, aL, ts: Date.now() };
        
        if(editingKey) {
            database.ref('attendance').child(editingKey).set(data)
            .then(() => { alert("Updated!"); resetForm(); })
            .catch(err => alert("Error saving data: " + err.message));
        } else {
            database.ref('attendance').push(data)
            .then(() => { alert("Saved!"); resetForm(); })
            .catch(err => alert("Error saving data: " + err.message));
        }
    }

    function resetForm() {
        editingKey = null; loadedPres = [];
        document.getElementById('mainSaveBtn').innerText = "Finalize & Save";
        document.getElementById('subject').value = "";
        document.getElementById('isExtraLecture').checked = false;
        document.getElementById('includeEE').checked = false;
        updateView(highlightMode);
    }

    function fetchHistory() {
        let ref = database.ref('attendance');
        ref.on('value', snap => {
            globalLogs = snap.val() || {};
            renderHistoryLogs();
        }, error => {
            console.error(error);
            document.getElementById('logsView').innerHTML = `<div style="color:#e57373; padding:15px; text-align:center;"><b>Database Access Denied!</b></div>`;
        });
    }

    function renderHistoryLogs() {
        const fDate = document.getElementById('filterDate').value;
        const view = document.getElementById('logsView');
        
        let keys = Object.keys(globalLogs);
        if(fDate) keys = keys.filter(k => globalLogs[k].date === fDate);
        
        if(keys.length === 0) { view.innerHTML = "<div style='padding:15px;'>No records found in database.</div>"; return; }
        
        view.innerHTML = keys.reverse().map(key => {
            const item = globalLogs[key];
            let badgeHTML = item.isExtra ? `<span class="type-badge">Extra Lecture</span>` : "";
            
            let displayDate = item.date;
            if(item.date && item.date.includes('-')) {
                const parts = item.date.split('-');
                displayDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            return `<div class="history-card">
                <div class="card-header">
                    ${isAdmin ? `<button class="btn-delete" onclick="deleteRec('${key}')">🗑️</button>` : ''}
                    <div style="flex:1; display:flex; justify-content:space-between; align-items:center; margin:0 10px; gap:8px;" onclick="this.parentElement.nextElementSibling.style.display=(this.parentElement.nextElementSibling.style.display==='block'?'none':'block')">
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; line-height:1.2;">
                            ${badgeHTML} 
                            <b style="word-break: break-word; color:var(--title-color);">${item.sub || 'Blank Subject'}</b>
                        </div>
                        <span style="white-space:nowrap; font-size:11px; color:var(--text-muted);">${displayDate} (${item.pL?item.pL.length:0}P) ▾</span>
                    </div>
                    ${isAdmin ? `<button class="btn-edit" onclick="editRec('${key}')">EDIT</button>` : ''}
                </div>
                <div class="card-body">
                    <button class="view-toggle" onclick="toggleTags(this)">Show Codes</button>
                    <div style="clear:both; margin-top:10px;"></div>
                    <b style="color:var(--present);">Present:</b><br><div class="p-list" style="margin-top:5px;">${renderTags(item.pL, 'p')}</div><br>
                    <b style="color:var(--absent);">Absent:</b><br><div class="a-list" style="margin-top:5px;">${renderTags(item.aL, 'a')}</div>
                </div>
            </div>`;
        }).join('');
    }

    function buildMatrixData() {
        const fSub = document.getElementById('filterSubject').value;
        let keys = Object.keys(globalLogs).filter(k => globalLogs[k].sub === fSub);
        
        if(keys.length === 0) return null;

        keys.sort((a, b) => globalLogs[a].date.localeCompare(globalLogs[b].date));

        const firstLogDate = new Date(globalLogs[keys[0]].date);
        const year = firstLogDate.getFullYear();
        const month = firstLogDate.getMonth();

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const weekdayNames = ["Su", "M", "Tu", "W", "Th", "F", "Sa"];

        const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
        const monthDurationHeader = `1 ${monthNames[month]} - ${totalDaysInMonth} ${monthNames[month]} ${year}`;

        const logsByDateMap = {};
        keys.forEach(key => {
            const log = globalLogs[key];
            const dayNum = parseInt(log.date.split('-')[2], 10);
            logsByDateMap[dayNum] = log; 
        });

        return { year, month, totalDaysInMonth, weekdayNames, monthDurationHeader, logsByDateMap, fSub };
    }

    function exportFilteredToExcel() {
        const matrix = buildMatrixData();
        if(!matrix) { alert("Data nahi mila!"); return; }

        let hasEEData = false;
        Object.keys(matrix.logsByDateMap).forEach(d => {
            const l = matrix.logsByDateMap[d];
            if ((l.pL || []).some(p => p.id && p.id.includes("10103")) || (l.aL || []).some(a => a.id && a.id.includes("10103"))) {
                hasEEData = true;
            }
        });
        const activeBaseStudents = hasEEData ? [...meStudents, ...eeStudents] : [...meStudents];
        activeBaseStudents.sort((a, b) => a.id.localeCompare(b.id));

        const aoaData = [];
        const row1 = ["", ""];
        for(let d=1; d<=matrix.totalDaysInMonth; d++) row1.push(d === 1 ? matrix.monthDurationHeader : "");
        aoaData.push(row1);

        const row2 = ["Roll No", "Student Name"];
        for(let d=1; d<=matrix.totalDaysInMonth; d++) {
            const day = new Date(matrix.year, matrix.month, d).getDay();
            row2.push(matrix.weekdayNames[day]);
        }
        aoaData.push(row2);

        const row3 = ["", ""];
        for(let d=1; d<=matrix.totalDaysInMonth; d++) row3.push(d);
        aoaData.push(row3);

        activeBaseStudents.forEach(s => {
            const studentRow = [s.id, s.name];
            for(let d=1; d<=matrix.totalDaysInMonth; d++) {
                if(matrix.logsByDateMap[d]) {
                    const l = matrix.logsByDateMap[d];
                    if((l.pL || []).map(p=>p.id).includes(s.id)) studentRow.push("P");
                    else if((l.aL || []).map(a=>a.id).includes(s.id)) studentRow.push("A");
                    else studentRow.push("");
                } else studentRow.push("");
            }
            aoaData.push(studentRow);
        });

        const ws = XLSX.utils.aoa_to_sheet(aoaData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance Grid");

        const colWidths = [{ wch: 15 }, { wch: 22 }];
        for(let d=1; d<=matrix.totalDaysInMonth; d++) colWidths.push({ wch: 4 });
        ws['!cols'] = colWidths;
        ws['!merges'] = [{ s: { r: 0, c: 2 }, e: { r: 0, c: matrix.totalDaysInMonth + 1 } }];

        XLSX.writeFile(wb, "Attendance_Report_" + matrix.fSub.replace(/[^a-zA-Z0-9]/g, "_") + ".xlsx");
    }

    // EXPANDED FULL-WIDTH PDF ENGINE (FILLS 100% HORIZONTAL SPACE + CLEARER FONTS)
    function exportFilteredToPDF() {
        try {
            const matrix = buildMatrixData();
            if(!matrix) { alert("Select kiye hue subject ka data available nahi hai!"); return; }

            let meList = [...meStudents].sort((a, b) => a.id.localeCompare(b.id));
            let eeList = [...eeStudents].sort((a, b) => a.id.localeCompare(b.id));

            let hasEE = false;
            Object.keys(matrix.logsByDateMap).forEach(d => {
                const lecture = matrix.logsByDateMap[d];
                if((lecture.pL || []).some(p => p.id && p.id.includes("10103")) || (lecture.aL || []).some(a => a.id && a.id.includes("10103"))) {
                    hasEE = true;
                }
            });

            const { jsPDF } = window.jspdf;
            
            // Native A4 Landscape Document
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });

            // 20 students partition chunking
            let chunks = [];
            for (let i = 0; i < meList.length; i += 20) {
                chunks.push({ branch: "MECHANICAL ENGINEERING (ME)", students: meList.slice(i, i + 20) });
            }

            if (hasEE) {
                for (let i = 0; i < eeList.length; i += 20) {
                    chunks.push({ branch: "ELECTRICAL ENGINEERING (EE)", students: eeList.slice(i, i + 20) });
                }
            }

            chunks.forEach((chunk, pageIndex) => {
                if (pageIndex > 0) doc.addPage('a4', 'landscape');

                const headerRow1 = [
                    { content: '', colSpan: 2, styles: { fillColor: [245, 245, 245] } },
                    { content: matrix.monthDurationHeader, colSpan: matrix.totalDaysInMonth, styles: { halign: 'center', fillColor: [234, 234, 234], fontStyle: 'bold' } }
                ];

                const headerRow2 = ['Roll No', 'Student Name'];
                const headerRow3 = ['', ''];

                for (let d = 1; d <= matrix.totalDaysInMonth; d++) {
                    const dayIdx = new Date(matrix.year, matrix.month, d).getDay();
                    headerRow2.push(matrix.weekdayNames[dayIdx]);
                    headerRow3.push(d.toString());
                }

                const bodyRows = chunk.students.map(s => {
                    const row = [s.id, s.name];
                    for (let d = 1; d <= matrix.totalDaysInMonth; d++) {
                        let statusChar = "";
                        if (matrix.logsByDateMap[d]) {
                            const lecture = matrix.logsByDateMap[d];
                            if ((lecture.pL || []).map(p => p.id).includes(s.id)) statusChar = "P";
                            else if ((lecture.aL || []).map(a => a.id).includes(s.id)) statusChar = "A";
                        }
                        row.push(statusChar);
                    }
                    return row;
                });

                // PROPORTIONALLY EXPANDED WIDTHS (Fills 289mm total printable A4 Landscape width)
                // Total printable = 297mm width - 8mm total margins = 289mm
                // 28mm (Roll No) + 53mm (Name) + 31 days * 6.7mm = 288.7mm
                const colStyles = {
                    0: { cellWidth: 28, halign: 'left' },
                    1: { cellWidth: 53, halign: 'left', fontStyle: 'bold' }
                };

                for (let d = 2; d <= matrix.totalDaysInMonth + 1; d++) {
                    colStyles[d] = { cellWidth: 6.7, halign: 'center' };
                }

                doc.autoTable({
                    head: [headerRow1, headerRow2, headerRow3],
                    body: bodyRows,
                    startY: 12,
                    margin: { top: 12, bottom: 4, left: 4, right: 4 },
                    styles: {
                        fontSize: 7.8, // Bigger text for maximum legibility
                        cellPadding: 1.8, // Comfortable padding
                        lineWidth: 0.15,
                        lineColor: [40, 40, 40],
                        textColor: [0, 0, 0]
                    },
                    headStyles: {
                        fillColor: [245, 245, 245],
                        textColor: [0, 0, 0],
                        fontStyle: 'bold',
                        halign: 'center'
                    },
                    columnStyles: colStyles,
                    didDrawPage: function(data) {
                        // Title Header placed in space
                        doc.setFontSize(10);
                        doc.setFont(undefined, 'bold');
                        doc.text(`SUBJECT: ${matrix.fSub.toUpperCase()} | BRANCH: ${chunk.branch}`, 148, 7, { align: 'center' });
                    },
                    didParseCell: function(data) {
                        if (data.section === 'body' && data.column.index >= 2) {
                            if (data.cell.raw === 'P') {
                                data.cell.styles.textColor = [39, 174, 96];
                                data.cell.styles.fontStyle = 'bold';
                            } else if (data.cell.raw === 'A') {
                                data.cell.styles.textColor = [198, 40, 40];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                        if (data.column.index >= 2) {
                            const dayNum = parseInt(data.table.columns[data.column.index].raw || "0", 10);
                            if (dayNum > 0) {
                                const dayIdx = new Date(matrix.year, matrix.month, dayNum).getDay();
                                if (dayIdx === 0) {
                                    data.cell.styles.fillColor = [255, 235, 238];
                                }
                            }
                        }
                    }
                });
            });

            doc.save(`Attendance_${matrix.fSub.replace(/[^a-zA-Z0-9]/g, "_")}.pdf`);
        } catch(e) {
            alert("PDF Download Error: " + e.message);
            console.error(e);
        }
    }

    function editRec(key) {
        database.ref('attendance').child(key).once('value', snap => {
            const d = snap.val();
            editingKey = key;
            loadedPres = (d.pL || []).map(p => p.id || p.n);
            document.getElementById('classDate').value = d.date;
            document.getElementById('subject').value = d.sub === "Blank Subject Name" ? "" : d.sub;
            document.getElementById('isExtraLecture').checked = d.isExtra === true;
            
            const totalP = (d.pL || []).some(p => p.id && p.id.includes("10103"));
            const totalA = (d.aL || []).some(a => a.id && a.id.includes("10103"));
            document.getElementById('includeEE').checked = (totalP || totalA);

            renderList();
            window.scrollTo({top:0, behavior:'smooth'});
        });
    }

    function deleteRec(k) { if(confirm("Delete Record?")) database.ref('attendance').child(k).remove(); }
    function renderTags(list, type) { if(!list) return "None"; return list.map(item => `<span class="tag ${type}-tag" data-full="${item.n}" data-code="${item.c || '??'}">${item.n}</span>`).join(''); }
    
    function toggleTags(btn) {
        const body = btn.parentElement;
        const tags = body.querySelectorAll('.tag');
        const isCodeMode = btn.innerText === "Show Names";
        tags.forEach(t => t.innerText = isCodeMode ? t.getAttribute('data-full') : t.getAttribute('data-code'));
        btn.innerText = isCodeMode ? "Show Codes" : "Show Names";
    }
</script>
