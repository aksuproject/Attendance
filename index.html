<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME Attendance - Secure Admin Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --present: #27ae60; --absent: #e74c3c; --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 10px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        .sort-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-sort { flex: 1; padding: 10px; border: 1px solid var(--primary); background: white; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-sort.active { background: var(--primary); color: white; }
        .list-header { display: flex; background: #eee; padding: 10px; font-weight: bold; border-radius: 4px; margin-bottom: 5px; }
        .list-row { display: flex; align-items: center; padding: 10px 5px; border-bottom: 1px solid #f1f1f1; }
        .col-sn { width: 10%; }
        .col-info { width: 55%; display: flex; flex-direction: column; line-height: 1.3; }
        .col-status { width: 35%; display: flex; justify-content: space-around; }
        .focus-main { font-size: 14px; font-weight: 800; color: #000; }
        .focus-sub { font-size: 10px; opacity: 0.7; }
        .radio-btn { cursor: pointer; display: flex; align-items: center; gap: 3px; font-weight: bold; }
        .radio-btn input { width: 18px; height: 18px; cursor: pointer; }
        .history-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; position: relative; }
        .card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; align-items: center; }
        .header-content { flex: 1; display: flex; justify-content: space-between; align-items: center; margin: 0 10px; }
        .card-body { padding: 12px; display: none; background: #fafafa; border-top: 1px solid #eee; }
        .view-toggle { background: #e0e0e0; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; float: right; }
        .tag { display: inline-block; padding: 3px 6px; border-radius: 4px; margin: 2px; font-size: 10px; font-weight: 500; }
        .p-tag { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .a-tag { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .btn-submit { background: var(--present); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 16px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: none; border: none; cursor: pointer; font-size: 16px; color: #bbb; }
        .admin-panel { margin-top: 40px; padding: 20px; background: #34495e; color: white; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header><h2 style="text-align:center; color:var(--primary); margin:0 0 15px 0;">Mechanical Attendance Cloud</h2></header>

    <div class="controls">
        <div class="input-group"><label>Class Date</label><input type="date" id="classDate"></div>
        <div class="input-group"><label>Subject</label><input type="text" id="subject" placeholder="Subject"></div>
        <div class="input-group"><label>Type</label>
            <select id="classType"><option>Lecture</option><option>Practical</option><option>Extra Class</option></select>
        </div>
    </div>

    <div class="sort-bar">
        <button id="sortName" class="btn-sort active" onclick="setHighlight('name')">Highlight Name</button>
        <button id="sortCode" class="btn-sort" onclick="setHighlight('id')">Highlight Code</button>
    </div>

    <div class="list-header"><div class="col-sn">SN</div><div class="col-info">Student Details</div><div class="col-status">Status (P/A)</div></div>
    <div id="listBody"></div>

    <button type="button" class="btn-submit" id="mainSaveBtn" onclick="pushToCloud()">Finalize & Save to Cloud</button>

    <div style="margin-top:30px; border-top:2px solid #ddd; padding-top:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">Recent History</h3>
            <input type="date" id="filterDate" onchange="fetchHistory(true)">
        </div>
        <div id="logsView">History Load Ho Rahi Hai...</div>
    </div>

    <div class="admin-panel" id="adminSection">
        <h4>Admin Access (Protected)</h4>
        <input type="password" id="adminPass" placeholder="••••••••" style="padding:8px; border-radius:4px; border:none; margin-right:10px; width: 150px; text-align:center;">
        <button onclick="adminLogin()" style="padding:8px 15px; background:#2c3e50; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">Login</button>
        <p id="adminStatus" style="font-size:10px; margin-top:10px; color:#bdc3c7;">Enter password to unlock Edit/Delete</p>
    </div>
</div>

<script>

    let students = [

        {sn: 65, id: "B2555R10103030", name: "AJAY TRIPATHI"}, {sn: 66, id: "B2555R10103034", name: "ABHAY SINGH"},
        {sn: 67, id: "B2555R10103035", name: "PRAKASH DOHAR"}, {sn: 68, id: "B2555R10103036", name: "AMIT PATEL"},
        {sn: 69, id: "B2555R10103037", name: "ANIKET RAJAK"}, {sn: 70, id: "B2555R10103038", name: "PRANSHU PAL"},
        {sn: 71, id: "B2555R10103039", name: "NITESH KUMAR VERMA"}, {sn: 72, id: "B2555R10103040", name: "SAGAR PATEL"},
        {sn: 73, id: "B2555R10103041", name: "ARPIT SAHU"}, {sn: 74, id: "B2555R10103042", name: "ANSH SINGH"},
        {sn: 75, id: "B2555R10103043", name: "SACHIN SAHU"}, {sn: 76, id: "B2555R10103044", name: "ASTITVA DWIVEDI"},
        {sn: 77, id: "B2555R10103048", name: "SHITESH KUSHWAHA"}
    ];

    window.onload = () => {
        const d = new Date().toISOString().split('T')[0];
        document.getElementById('classDate').value = d;
        students.sort((a,b) => a.id.localeCompare(b.id));
        renderList();
        fetchHistory(false);
    };

    function adminLogin() {
        const passInput = document.getElementById('adminPass');
        if(passInput.value === "siar@2020") {
            isAdmin = true;
            document.getElementById('adminSection').style.background = "#27ae60";
            document.getElementById('adminStatus').innerText = "Admin Access Granted ✅";
            passInput.value = ""; // Clear password after login
            fetchHistory(false);
            alert("Admin features (Edit/Delete) unlocked.");
        } else alert("Mafi chahte hain, galat password!");
    }

    function setHighlight(mode) {
        highlightMode = mode;
        document.getElementById('sortName').className = (mode === 'name') ? 'btn-sort active' : 'btn-sort';
        document.getElementById('sortCode').className = (mode === 'id') ? 'btn-sort active' : 'btn-sort';
        renderList();
    }

    function renderList() {
        const list = document.getElementById('listBody');
        list.innerHTML = students.map(s => `
            <div class="list-row">
                <div class="col-sn">${s.sn}</div>
                <div class="col-info">
                    <span class="${highlightMode==='name'?'focus-main':'focus-sub'}">${s.name}</span>
                    <span class="${highlightMode==='id'?'focus-main':'focus-sub'}">${s.id}</span>
                </div>
                <div class="col-status">
                    <label class="radio-btn"><input type="radio" name="st_${s.id}" value="P"><span style="color:var(--present)">P</span></label>
                    <label class="radio-btn"><input type="radio" name="st_${s.id}" value="A" checked><span>A</span></label>
                </div>
            </div>
        `).join('');
    }

    function pushToCloud() {
        const date = document.getElementById('classDate').value;
        const sub = document.getElementById('subject').value || "Unnamed Subject";
        const type = document.getElementById('classType').value;
        let pL = [], aL = [];
        
        students.forEach(s => {
            const val = document.querySelector(`input[name="st_${s.id}"]:checked`).value;
            let entry = { n: s.name, c: s.id.slice(-4), id: s.id };
            val === 'P' ? pL.push(entry) : aL.push(entry);
        });

        const record = { date, sub, type, pL, aL, ts: Date.now() };

        if(editingKey) {
            database.ref('attendance').child(editingKey).set(record).then(() => {
                alert("Attendance Record Updated Successfully!");
                resetForm();
            });
        } else {
            database.ref('attendance').push(record).then(() => {
                alert("Attendance Saved to Cloud!");
                resetForm();
            });
        }
    }

    function resetForm() {
        editingKey = null;
        document.getElementById('mainSaveBtn').innerText = "Finalize & Save to Cloud";
        document.getElementById('mainSaveBtn').style.background = "var(--present)";
        document.getElementById('subject').value = "";
        document.querySelectorAll('input[type="radio"][value="A"]').forEach(r => r.checked = true);
    }

    function fetchHistory(byDate) {
        const fDate = document.getElementById('filterDate').value;
        let query = database.ref('attendance');
        if(byDate && fDate) query = query.orderByChild('date').equalTo(fDate);

        query.on('value', snap => {
            const data = snap.val();
            const view = document.getElementById('logsView');
            if(!data) { view.innerHTML = "<center>Record nahi mila.</center>"; return; }
            view.innerHTML = Object.keys(data).reverse().map(k => {
                const log = data[k];
                return `<div class="history-card">
                    <div class="card-header">
                        ${isAdmin ? `<button class="btn-delete" onclick="deleteLog('${k}')">🗑️</button>` : ''}
                        <div class="header-content" onclick="toggleBody(this)">
                            <span><b>${log.sub}</b> (${log.date})</span>
                            <span>P:${log.pL?log.pL.length:0} A:${log.aL?log.aL.length:0} ▾</span>
                        </div>
                        ${isAdmin ? `<button class="btn-edit" onclick="editLog('${k}')">EDIT</button>` : ''}
                    </div>
                    <div class="card-body">
                        <button class="view-toggle" onclick="toggleNames(this)">Show Codes</button>
                        <div style="clear:both;"></div>
                        <b>Present:</b><br><div class="p-list">${renderTags(log.pL, 'p')}</div><br>
                        <b>Absent:</b><br><div class="a-list">${renderTags(log.aL, 'a')}</div>
                    </div>
                </div>`;
            }).join('');
        });
    }

    // EDIT FUNCTION Jismein table load hogi
    function editLog(key) {
        database.ref('attendance').child(key).once('value', snap => {
            const log = snap.val();
            editingKey = key;
            
            document.getElementById('classDate').value = log.date;
            document.getElementById('subject').value = log.sub;
            document.getElementById('classType').value = log.type;
            
            const btn = document.getElementById('mainSaveBtn');
            btn.innerText = "UPDATE DATA (" + log.date + ")";
            btn.style.background = "#f39c12";

            // Pehle sabko Absent mark karo
            document.querySelectorAll('input[type="radio"][value="A"]').forEach(r => r.checked = true);

            // Ab jo Present the unhe table mein mark karo
            if(log.pL) {
                log.pL.forEach(student => {
                    // Match by Full ID
                    let r = document.querySelector(`input[name="st_${student.id}"][value="P"]`);
                    // Fallback match by Name
                    if(!r) {
                        const target = students.find(s => s.name === student.n);
                        if(target) r = document.querySelector(`input[name="st_${target.id}"][value="P"]`);
                    }
                    if(r) r.checked = true;
                });
            }
            
            window.scrollTo({top: 0, behavior: 'smooth'});
            alert("Attendance Data Load Ho Gaya Hai. Ab Edit Kar Sakte Hain.");
        });
    }

    function deleteLog(key) { if(confirm("Kya aap sach mein ise delete karna chahte hain?")) database.ref('attendance').child(key).remove(); }
    function renderTags(list, type) { if(!list) return "None"; return list.map(item => `<span class="tag ${type}-tag" data-full="${item.n}" data-code="${item.c}">${item.n}</span>`).join(''); }
    function toggleNames(btn) {
        const body = btn.parentElement;
        const tags = body.querySelectorAll('.tag');
        const isCodeMode = btn.innerText === "Show Names";
        tags.forEach(t => t.innerText = isCodeMode ? t.getAttribute('data-full') : t.getAttribute('data-code'));
        btn.innerText = isCodeMode ? "Show Codes" : "Show Names";
    }
    function toggleBody(el) { const b = el.parentElement.nextElementSibling; b.style.display = (b.style.display==='block'?'none':'block'); }
</script>
</body>
</html>
