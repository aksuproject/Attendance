<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ME Attendance Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --present: #27ae60; --absent: #e74c3c; --primary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 12px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        #adminPanel { display: none; border-bottom: 3px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .input-group { display: flex; flex-direction: column; justify-content: center; }
        label { font-weight: bold; font-size: 10px; color: #555; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        
        .sort-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-sort { flex: 1; padding: 10px; border: 1px solid var(--primary); background: white; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-sort.active { background: var(--primary); color: white; }
        
        .list-header { display: flex; background: #eee; padding: 10px; font-weight: bold; border-radius: 4px; margin-bottom: 5px; }
        .list-row { display: flex; align-items: center; padding: 10px 5px; border-bottom: 1px solid #f1f1f1; }
        .col-sn { width: 10%; }
        .col-info { width: 55%; display: flex; flex-direction: column; line-height: 1.3; }
        .col-status { width: 35%; display: flex; justify-content: space-around; }

        .focus-main { font-size: 14px; font-weight: 800; color: #000; }
        .focus-sub { font-size: 10px; opacity: 0.7; }
        .radio-btn { cursor: pointer; font-weight: bold; }

        .history-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; }
        .card-header { padding: 12px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; align-items: center; }
        .card-body { padding: 12px; display: none; background: #fafafa; border-top: 1px solid #eee; }
        
        .btn-submit { background: var(--present); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 16px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: none; border: none; cursor: pointer; font-size: 16px; color: #bbb; }
        .view-toggle { background: #e0e0e0; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; float: right; }
        
        .login-footer { margin-top: 30px; padding: 20px; background: #eee; border-radius: 12px; text-align: center; }
        .tag { display: inline-block; padding: 3px 6px; border-radius: 4px; margin: 2px; font-size: 10px; font-weight: 500; }
        .p-tag { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .a-tag { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        .type-badge { color: white; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; display: inline-block; }
        .checkbox-container { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--absent); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--primary);">Mechanical Attendance</h2>

    <div id="adminPanel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="color: green; font-weight: bold;">Editor Mode Active</span>
            <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer;">Logout</button>
        </div>

        <div class="controls">
            <div class="input-group">
                <label>Class Date</label>
                <input type="date" id="classDate">
            </div>
            <div class="input-group">
                <label>Subject</label>
                <input type="text" id="subject" list="subjectList" placeholder="Select or type subject...">
                <datalist id="subjectList">
                    <option value="Mathematics II"></option>
                    <option value="Chemistry I"></option>
                    <option value="Chemistry Lab"></option>
                    <option value="PPS"></option>
                    <option value="PPS Lab"></option>
                    <option value="Workshop"></option>
                    <option value="Workshop Lab"></option>
                    <option value="Communication Skills"></option>
                    <option value="Yoga & Sports"></option>
                </datalist>
            </div>
            <div class="input-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="isExtraLecture" style="width: 18px; height: 18px; accent-color: var(--absent); cursor: pointer;">
                    <span>Mark as Extra Lecture</span>
                </label>
            </div>
        </div>

        <div class="sort-bar">
            <button id="sortName" class="btn-sort active" onclick="updateView('name')">Highlight Name</button>
            <button id="sortCode" class="btn-sort" onclick="updateView('id')">Highlight Code</button>
        </div>

        <div class="list-header"><div class="col-sn">SN</div><div class="col-info">Student Details</div><div class="col-status">Status</div></div>
        <div id="listBody"></div>

        <button type="button" class="btn-submit" id="mainSaveBtn" onclick="pushToCloud()">Finalize & Save</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0;">History Search</h3>
        <input type="date" id="filterDate" onchange="fetchHistory(true)" style="padding: 5px;">
    </div>
    <div id="logsView">Loading logs...</div>

    <div class="login-footer" id="loginBox">
        <p>Login to add or edit attendance</p>
        <input type="password" id="adminPass" placeholder="••••••••" style="padding:8px; border-radius:4px; border:1px solid #ccc; margin-bottom: 10px;"><br>
        <button onclick="login()" style="padding:8px 20px; background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer;">Admin Login</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBxDdaeuRPuiDO2JYHFNfLzr7HcnzmrgAc",
      authDomain: "me-attendance-dbe63.firebaseapp.com",
      databaseURL: "https://me-attendance-dbe63-default-rtdb.firebaseio.com",
      projectId: "me-attendance-dbe63",
      storageBucket: "me-attendance-dbe63.firebasestorage.app",
      messagingSenderId: "227683930891",
      appId: "1:227683930891:web:fddd8b6d11bc9ef98c880e"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let highlightMode = 'name', isAdmin = false, editingKey = null, loadedPres = [];
    let students = [
        {sn: 1, id: "B2555R10102001", name: "ABHISHEK KUMAR"}, {sn: 2, id: "B2555R10102002", name: "SANJEEV KUMAR"},
        {sn: 3, id: "B2555R10102005", name: "SATEESH KUMAR CHAUDHARI"}, {sn: 4, id: "B2555R10102006", name: "AJEET SINGH"},
        {sn: 5, id: "B2555R10102007", name: "KARAN KUMAR VERMA"}, {sn: 6, id: "B2555R10102008", name: "SHIVENDRA PRATAP VERMA"},
        {sn: 7, id: "B2555R10102010", name: "VIJESH RAGHUVANSHI"}, {sn: 8, id: "B2555R10102011", name: "AMAR VERMA"},
        {sn: 9, id: "B2555R10102012", name: "AMOL PANDEY"}, {sn: 10, id: "B2555R10102013", name: "KISHAN VERMA"},
        {sn: 11, id: "B2555R10102014", name: "ANSHIL VISHWAKARMA"}, {sn: 12, id: "B2555R10102017", name: "RAHUL SAKET"},
        {sn: 13, id: "B2555R10102018", name: "VINAY CHAUDHARY"}, {sn: 14, id: "B2555R10102019", name: "SANDHYA PRAJAPATI"},
        {sn: 15, id: "B2555R10102020", name: "SATYAM YADAV"}, {sn: 16, id: "B2555R10102021", name: "GAURAV KUSHWAHA"},
        {sn: 17, id: "B2555R10102022", name: "DURGESH PRAJAPATI"}, {sn: 18, id: "B2555R10102023", name: "SACHIN KUSHWAHA"},
        {sn: 19, id: "B2555R10102024", name: "SINGH SEJAL VIJAY"}, {sn: 20, id: "B2555R10102025", name: "ARYAN SINGH"},
        {sn: 21, id: "B2555R10102026", name: "AMAN KUSHWAHA"}, {sn: 22, id: "B2555R10102027", name: "AMAN VISHWAKARMA"},
        {sn: 23, id: "B2555R10102028", name: "SAHIL SAKET"}, {sn: 24, id: "B2555R10102029", name: "LUCKY VERMA"},
        {sn: 25, id: "B2555R10102030", name: "ANSH DAHIYA"}, {sn: 26, id: "B2555R10102031", name: "AJAY KUMAR CHAUDHARY"},
        {sn: 27, id: "B2555R10102033", name: "PRIYANSHU KUSHWAHA"}, {sn: 28, id: "B2555R10102034", name: "ABHISHEK PRAJAPATI"},
        {sn: 29, id: "B2555R10102035", name: "SUMIT KUSHWAHA"}, {sn: 30, id: "B2555R10102037", name: "ADITYA SINGH GAUTAM"},
        {sn: 31, id: "B2555R10102038", name: "SANJU AHIRWAR"}, {sn: 32, id: "B2555R10102039", name: "PARTH SONI"},
        {sn: 33, id: "B2555R10102041", name: "HARISHANKAR PATEL"}, {sn: 34, id: "B2555R10102042", name: "ANUJ BARMAN"},
        {sn: 35, id: "B2555R10102043", name: "MOHIT BANSAL"}, {sn: 36, id: "B2555R10102044", name: "RAHUL KUSHWAHA"},
        {sn: 37, id: "B2555R10102046", name: "SHREYESH SINGH"}, {sn: 38, id: "B2555R10102047", name: "LAKKI MOHAMMAD"},
        {sn: 39, id: "B2555R10102048", name: "ANAND SAHU"}, {sn: 40, id: "B2555R10102049", name: "SHIVAM KUSHWAHA"}
    ];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('classDate').value = today;
        updateView('name');
        fetchHistory(false);
    };

    function login() {
        if(document.getElementById('adminPass').value === "ego360") {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('loginBox').style.display = "none";
            fetchHistory(false);
            alert("Login Successful");
        } else alert("Invalid Password");
    }

    function logout() {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = "none";
        document.getElementById('loginBox').style.display = "block";
        fetchHistory(false);
    }

    function updateView(mode) {
        highlightMode = mode;
        document.getElementById('sortName').className = (mode === 'name') ? 'btn-sort active' : 'btn-sort';
        document.getElementById('sortCode').className = (mode === 'id') ? 'btn-sort active' : 'btn-sort';
        if(mode === 'name') students.sort((a,b) => a.name.localeCompare(b.name));
        else students.sort((a,b) => a.id.localeCompare(b.id));
        renderList();
    }

    function renderList() {
        const listBody = document.getElementById('listBody');
        listBody.innerHTML = students.map(s => {
            const isP = loadedPres.includes(s.id) || loadedPres.includes(s.name);
            return `<div class="list-row">
                <div class="col-sn">${s.sn}</div>
                <div class="col-info">
                    <span class="${highlightMode==='name'?'focus-main':'focus-sub'}">${s.name}</span>
                    <span class="${highlightMode==='id'?'focus-main':'focus-sub'}">${s.id}</span>
                </div>
                <div class="col-status">
                    <label class="radio-btn"><input type="radio" name="st_${s.id}" value="P" ${isP?'checked':''}> P</label>
                    <label class="radio-btn"><input type="radio" name="st_${s.id}" value="A" ${!isP?'checked':''}> A</label>
                </div>
            </div>`;
        }).join('');
    }

    function pushToCloud() {
        const date = document.getElementById('classDate').value;
        const sub = document.getElementById('subject').value || "No Subject";
        const isExtra = document.getElementById('isExtraLecture').checked;
        
        let pL = [], aL = [];
        let sortedToSave = [...students].sort((a,b) => a.id.localeCompare(b.id));

        sortedToSave.forEach(s => {
            const isP = document.querySelector(`input[name="st_${s.id}"]:checked`).value === 'P';
            let entry = { n: s.name, id: s.id, c: s.id.slice(-4) };
            isP ? pL.push(entry) : aL.push(entry);
        });

        const data = { date, sub, isExtra, pL, aL, ts: Date.now() };
        
        if(editingKey) {
            database.ref('attendance').child(editingKey).set(data)
            .then(() => { alert("Updated!"); resetForm(); })
            .catch(err => alert("Error saving data: " + err.message));
        } else {
            database.ref('attendance').push(data)
            .then(() => { alert("Saved!"); resetForm(); })
            .catch(err => alert("Error saving data: " + err.message));
        }
    }

    function resetForm() {
        editingKey = null; loadedPres = [];
        document.getElementById('mainSaveBtn').innerText = "Finalize & Save";
        document.getElementById('mainSaveBtn').style.background = "var(--present)";
        document.getElementById('subject').value = "";
        document.getElementById('isExtraLecture').checked = false;
        updateView(highlightMode);
    }

    function fetchHistory(filter) {
        let ref = database.ref('attendance');
        const fDate = document.getElementById('filterDate').value;
        if(filter && fDate) ref = ref.orderByChild('date').equalTo(fDate);

        ref.on('value', snap => {
            const logs = snap.val();
            const view = document.getElementById('logsView');
            if(!logs) { view.innerHTML = "<center>No records found.</center>"; return; }
            
            view.innerHTML = Object.keys(logs).reverse().map(key => {
                const item = logs[key];
                
                let badgeHTML = "";
                if (item.isExtra === true || item.type === "Extra Class") {
                    badgeHTML = `<span class="type-badge" style="background:#e74c3c;">Extra Lecture</span>`;
                } else if (item.type === "Practical" || item.type === "Lab") {
                    badgeHTML = `<span class="type-badge" style="background:#8e44ad;">Lab</span>`;
                }

                return `<div class="history-card">
                    <div class="card-header">
                        ${isAdmin ? `<button class="btn-delete" onclick="deleteRec('${key}')">🗑️</button>` : ''}
                        
                        <div style="flex:1; display:flex; justify-content:space-between; align-items:center; margin:0 10px; gap:8px;" onclick="this.parentElement.nextElementSibling.style.display=(this.parentElement.nextElementSibling.style.display==='block'?'none':'block')">
                            
                            <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; line-height:1.2;">
                                ${badgeHTML} 
                                <b style="word-break: break-word;">${item.sub}</b>
                            </div>
                            
                            <span style="white-space:nowrap; font-size:11px;">${item.date} (${item.pL?item.pL.length:0}P) ▾</span>
                        </div>

                        ${isAdmin ? `<button class="btn-edit" onclick="editRec('${key}')">EDIT</button>` : ''}
                    </div>
                    <div class="card-body">
                        <button class="view-toggle" onclick="toggleTags(this)">Show Codes</button>
                        <div style="clear:both; margin-top:10px;"></div>
                        <b>Present:</b><br><div class="p-list">${renderTags(item.pL, 'p')}</div><br>
                        <b>Absent:</b><br><div class="a-list">${renderTags(item.aL, 'a')}</div>
                    </div>
                </div>`;
            }).join('');
        }, error => {
            console.error(error);
            document.getElementById('logsView').innerHTML = `<div style="color:#c62828; padding:15px; border:1px solid #ffcdd2; border-radius:8px; background:#ffebee; text-align:center;">
                <b>Database Access Denied!</b><br><br>
                Aapke Firebase Database ke rules expire ho gaye hain.<br>
                Kripya Firebase console mein jaakar rules ko <b>true</b> karein.
            </div>`;
        });
    }

    function editRec(key) {
        database.ref('attendance').child(key).once('value', snap => {
            const d = snap.val();
            editingKey = key;
            loadedPres = (d.pL || []).map(p => p.id || p.n);
            
            document.getElementById('classDate').value = d.date;
            document.getElementById('subject').value = d.sub;
            
            const isExtra = d.isExtra === true || d.type === "Extra Class";
            document.getElementById('isExtraLecture').checked = isExtra;
            
            document.getElementById('mainSaveBtn').innerText = "Update Now";
            document.getElementById('mainSaveBtn').style.background = "#f39c12";
            renderList();
            window.scrollTo({top:0, behavior:'smooth'});
        });
    }

    function deleteRec(k) { if(confirm("Delete Rec?")) database.ref('attendance').child(k).remove(); }
    function renderTags(list, type) { if(!list) return "None"; return list.map(item => `<span class="tag ${type}-tag" data-full="${item.n}" data-code="${item.c || '??'}">${item.n}</span>`).join(''); }
    
    function toggleTags(btn) {
        const body = btn.parentElement;
        const tags = body.querySelectorAll('.tag');
        const isCodeMode = btn.innerText === "Show Names";
        tags.forEach(t => t.innerText = isCodeMode ? t.getAttribute('data-full') : t.getAttribute('data-code'));
        btn.innerText = isCodeMode ? "Show Codes" : "Show Names";
    }
</script>
</body>
</html>
